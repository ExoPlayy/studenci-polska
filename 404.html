<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,follow">
  <title>Nie znaleziono strony | Studenci Polska</title>
  <meta name="description" content="Ta strona nie istnieje. Wróć do listy miast akademickich lub poradników dla studentów.">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/styles.css">
  <style>
    .error-page{min-height:100vh;display:grid;place-items:center;padding:32px;background:#f4f0e7;color:#09213f}
    .error-card{width:min(760px,100%);padding:clamp(36px,7vw,84px);border:1px solid rgba(9,33,63,.16);background:#fff}
    .error-code{margin:0 0 18px;color:#ff554f;font:700 italic clamp(52px,10vw,112px)/.85 Georgia,serif}
    .error-card h1{margin:0 0 20px;font-size:clamp(34px,6vw,68px);line-height:.98}
    .error-card p{max-width:580px;margin:0 0 30px;color:#596b7e;font-size:18px;line-height:1.7}
    .error-actions{display:flex;flex-wrap:wrap;gap:12px}
    .error-actions a{display:inline-flex;align-items:center;min-height:52px;padding:0 22px;border:1px solid #09213f;color:#09213f;font-weight:700;text-decoration:none}
    .error-actions a:first-child{background:#ff554f;border-color:#ff554f;color:#fff}
  </style>
</head>
<body>
  <a class="skip-link" href="#main-content">Przejdź do treści</a>
  <main id="main-content" class="error-page">
    <section class="error-card" aria-labelledby="error-title">
      <p class="error-code" aria-hidden="true">404</p>
      <h1 id="error-title">Ta droga nie prowadzi na kampus.</h1>
      <p>Adres mógł się zmienić albo zawiera literówkę. Wróć do miast akademickich lub sprawdź praktyczne poradniki dla studentów.</p>
      <div class="error-actions">
        <a href="/#miasta">Zobacz miasta</a>
        <a href="/poradniki.html">Przejdź do poradników</a>
      </div>
    </section>
  </main>
  <script src="/analytics.js" defer></script>
</body>
</html>
