name: Wdrożenie prywatnych statystyk

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "analytics/**"
      - ".github/workflows/deploy-analytics.yml"

concurrency:
  group: analytics-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FTP_HOST: s184.cyber-folks.pl
      FTP_USER: stats@grupystudenckie.pl
      FTP_PASSWORD: ${{ secrets.CF_FTP_PASSWORD }}
      DB_PASSWORD: ${{ secrets.ANALYTICS_DB_PASSWORD }}
      ADMIN_PASSWORD: ${{ secrets.ANALYTICS_ADMIN_PASSWORD }}
    steps:
      - name: Pobierz pliki
        uses: actions/checkout@v4

      - name: Sprawdź kod panelu
        shell: bash
        run: find analytics -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Sprawdź wymagane sekrety
        shell: bash
        run: |
          test -n "$FTP_PASSWORD" || { echo "Brakuje sekretu CF_FTP_PASSWORD"; exit 1; }
          test -n "$DB_PASSWORD" || { echo "Brakuje sekretu ANALYTICS_DB_PASSWORD"; exit 1; }
          test -n "$ADMIN_PASSWORD" || { echo "Brakuje sekretu ANALYTICS_ADMIN_PASSWORD"; exit 1; }

      - name: Przygotuj bezpieczną konfigurację
        shell: bash
        run: |
          mkdir -p .analytics-deploy
          cp -a analytics/. .analytics-deploy/
          php -r '
            $db = getenv("DB_PASSWORD");
            $admin = getenv("ADMIN_PASSWORD");
            $config = [
              "db_host" => "localhost",
              "db_name" => "oazapl_stats",
              "db_user" => "oazapl_stats",
              "db_password" => $db,
              "admin_password_hash" => password_hash($admin, PASSWORD_DEFAULT),
              "hash_key" => hash_hmac("sha256", $db, $admin),
              "allowed_origins" => [
                "https://grupystudenckie.pl",
                "https://www.grupystudenckie.pl",
                "https://exoplayy.github.io"
              ]
            ];
            file_put_contents(".analytics-deploy/.analytics-config.php", "<?php\nreturn " . var_export($config, true) . ";\n");
          '
          rm -f .analytics-deploy/config.example.php

      - name: Uzupełnij łańcuch certyfikatu Cyber_Folks
        shell: bash
        run: |
          curl --fail --silent --show-error --location \
            'https://certumdvtlsg2r39ca.repository.certum.pl/certumdvtlsg2r39ca.cer' \
            --output certum-r39.cer
          openssl x509 -inform DER -in certum-r39.cer -out certum-r39.pem
          test "$(openssl x509 -in certum-r39.pem -noout -fingerprint -sha256 | cut -d= -f2)" = \
            "83:C0:A5:A7:68:44:C8:40:DF:AF:82:0F:FD:02:AD:F6:57:3A:26:82:3E:F6:AF:75:8A:33:84:A0:AC:04:40:83"
          cat /etc/ssl/certs/ca-certificates.crt certum-r39.pem > .ftp-ca-bundle.pem

      - name: Wyślij panel na Cyber_Folks
        shell: bash
        run: |
          # Najpierw sprawdzamy samo logowanie i katalog. GitHub automatycznie
          # maskuje wartość sekretu w logach, a szczegóły odpowiedzi serwera
          # pozwalają odróżnić błędne dane od blokady połączenia.
          curl --fail --verbose \
            --connect-timeout 20 --max-time 60 \
            --ssl-reqd --cacert .ftp-ca-bundle.pem \
            --user "$FTP_USER:$FTP_PASSWORD" \
            --list-only "ftp://$FTP_HOST/"

          while IFS= read -r -d '' file; do
            remote_path="${file#.analytics-deploy/}"
            curl --fail --silent --show-error \
              --connect-timeout 20 --max-time 120 \
              --ftp-create-dirs --ssl-reqd --cacert .ftp-ca-bundle.pem \
              --user "$FTP_USER:$FTP_PASSWORD" \
              --upload-file "$file" "ftp://$FTP_HOST/$remote_path"
          done < <(find .analytics-deploy -type f -print0)
